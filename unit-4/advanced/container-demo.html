<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Query Demo</title>

    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="container-demo.css">
</head>
<body>

<header>
    <h1>Container Queries</h1>
</header>

<main class="page">

    <div class="container narrow">
        <article class="feature">
            <h2>Feature Card</h2>
            <p>This layout changes based on container size, not the viewport.</p>
        </article>
    </div>

    <div class="container wide">
        <article class="feature">
            <h2>Feature Card</h2>
            <p>This layout switches to horizontal when the container is wide.</p>
        </article>
    </div>

</main>

</body>
</html>
