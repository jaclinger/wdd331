<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Demo</title>

    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="sticky-demo.css">
</head>
<body>

<header class="page-header">
    <h1>Sticky Layout</h1>
</header>

<div class="layout">

    <aside class="toc">
        <h2>Table of Contents</h2>
        <ul>
            <li>Section 1</li>
            <li>Section 2</li>
            <li>Section 3</li>
        </ul>
    </aside>

    <main class="content">

        <section>
            <h2>Section 1</h2>
            <p>Scroll content...</p>
        </section>

        <section>
            <h2>Section 2</h2>
            <p>More scroll content...</p>
        </section>

        <section>
            <h2>Section 3</h2>
            <p>Even more scroll content...</p>
        </section>

    </main>

</div>

</body>
</html>
