<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Joseph Clinger</title>

  <!-- Make sure this path matches your folder structure -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER (optional but recommended for consistency) -->
 <header class="site-header">
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

  <main class="contact-page">

    <h1>Contact Me</h1>

    <p class="contact-intro">
      Feel free to reach out for internship opportunities, collaboration, or questions.
    </p>

    <!-- CONTACT INFO (optional but useful for resume sites) -->
    <section class="contact-info">
      <p><strong>Email:</strong> joseph@example.com</p>
      <p><strong>Location:</strong> Rexburg, ID</p>
      <p><strong>GitHub:</strong> github.com/yourusername</p>
      <p><strong>LinkedIn:</strong> linkedin.com/in/yourprofile</p>
    </section>

    <!-- CONTACT FORM -->
    <form class="contact-form">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="updates" name="updates">
        <label for="updates">Subscribe to updates</label>
      </div>

      <button type="submit" class="btn">
        Send Message
      </button>

    </form>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 Joseph Clinger</p>
  </footer>

</body>
</html>
